name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Versiyon artışı'
        required: false
        default: auto
        type: choice
        options: [auto, patch, minor, major]

jobs:
  release:
    uses: berkayakkocc/shared-workflows/.github/workflows/release.yml@main
    with:
      bump: ${{ inputs.bump }}
    secrets: inherit
