name: Update Project Context (Reusable)

on:
  workflow_call:
    secrets:
      GH_PAT:
        required: true

jobs:
  update-context:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 10

      - name: Download update-context script
        run: |
          curl -fsSL "https://raw.githubusercontent.com/berkayakkocc/shared-workflows/main/scripts/update-context.js" -o /tmp/update-context.js

      - name: Regenerate and commit PROJECT_CONTEXT.md
        continue-on-error: true
        run: |
          git config user.name "Pipeline Bot"
          git config user.email "bot@pipeline.com"
          git fetch origin main
          git reset --hard origin/main
          node /tmp/update-context.js
          git add PROJECT_CONTEXT.md
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "docs: auto-update PROJECT_CONTEXT.md [skip ci]"
          git push
